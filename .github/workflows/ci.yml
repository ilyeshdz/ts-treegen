name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2

      - uses: actions/setup-node@v5
        with:
          node-version: "lts/*"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run fmt:check

      - run: pnpm run lint

      - run: pnpm run typecheck

      - run: pnpm run test

      - run: pnpm run build
